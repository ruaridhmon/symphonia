        rationale: The synthesis demonstrates a high degree of traceability. Every consensus/majority statement [C1] through
          [C6] is supported by explicit source IDs (e.g., E1, E5). Beneath each claim, specific evidence quotes are provided
          with direct attribution. The audit trail is clear, allowing a reviewer to verify the "funding" claim in [C1] directly
