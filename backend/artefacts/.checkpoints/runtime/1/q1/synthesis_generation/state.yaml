          school accountability and performance metrics" is more accurately found in E5 and E6.'
      neutrality:
        dimension: neutrality
        rationale: The synthesis identifies several drivers but repeatedly uses evaluative and non-neutral language. The use
          of "significant" twice (C3, Under-resourced infrastructure), "effective" (C6), and "genuine" (Tensions) assigns
          value and urgency rather than maintaining a facilitator posture. The phrase "prevent effective early intervention"
          (C6) implies a recommended outcome. The framing of "preventative" vs "crisis management" in the Tensions section
          implicitly favors the former. The synthesis fails the "perfect neutrality" test by including descriptors like "significant
          postcode lottery" and "increasing complexity," which prescribe a specific weight to these issues rather than attributing
          the perception of weight to the sources.
        score: 3
        suggestions:
        - In C1, remove "insufficient" as it is an evaluative judgment; replace with "is described as not meeting" or similar
          attributed phrasing.
        - In C3, remove "significantly" to avoid weighting the impact of the pandemic.
        - In C6, remove "effective" and "prevent" to avoid implicit recommendation of early intervention; rephrase to "impacts
          the delivery of early intervention."
        - In the Tensions section, replace "genuine rise" with "attributed rise" to maintain neutrality on the biological
          debate.
