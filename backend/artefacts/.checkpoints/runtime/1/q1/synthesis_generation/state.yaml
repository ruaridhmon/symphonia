artefact_type: synthesis
current_artefact:
  areas_of_agreement:
  - There is a significant "postcode lottery" where access to support depends on local authority capacity.
  - The current volume of EHCP requests is unsustainable for local government budgets.
  - Early intervention is more cost-effective than crisis management, yet remains underfunded.
  - There is a critical shortage of educational psychologists and specialist teaching staff.
  - The rise in mental health needs and neurodiversity awareness has significantly increased demand for SEN services.
  - The current system is reactive rather than preventative, focusing resources on crisis management.
  - Mainstream schools currently lack the physical and human infrastructure to support the increasing complexity of needs.
  - Early intervention is theoretically more cost-effective but currently underfunded in favor of crisis management.
  - The current system is financially unsustainable in its present trajectory.
  areas_of_disagreement:
  - The role of private/independent special school placements in draining budgets from the state sector.
  - Whether the solution lies in increasing total funding or fundamentally reforming the 2014 Children and Families Act.
  - Whether the increase in SEN cases reflects a genuine rise in biological conditions or a societal/educational shift.
  - The extent to which "parental choice" should dictate high-cost independent specialist placements.
  - The extent to which the 2014 reforms are responsible for the current crisis versus subsequent underfunding.
  - The efficacy of the SEND tribunal system in ensuring equitable outcomes.
  - The extent to which the legal framework (Children and Families Act 2014) is the solution or part of the problem.
  - Whether the rise in SEN is due to better clinical identification or a failure of the general education system to be flexible.
  - Whether the rise in EHCP requests is driven by increased need or by the failure of mainstream 'ordinarily available' provision.
  claims:
  - agreement_level: consensus
    claim_id: T0_C1
    counterarguments:
