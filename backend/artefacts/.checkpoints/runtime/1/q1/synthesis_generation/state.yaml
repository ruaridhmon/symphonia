          C6 uses the phrase "detachment from the altruistic ideals," which is a subjective synthesis of E6's "loss of momentum"
          and E11's "exhaustion," but neither expert explicitly claims a "detachment from ideals" as a primary driver. New_C7
          attributes "deliberate systemic starvation" to E1 and E9; while E1 uses the term "systemic starvation," E9 speaks
          of "ideological dismantling" and "budgetary efficiencies," but does not characterize it as "deliberate" in the same
          conspiratorial sense as E1. Most critically, new_C8 introduces the terms "dehumanization" and "societal ambivalence"
          and attributes them to E12 and E8. While E12 mentions a "failure of the heart," the term "dehumanization" is a novel,
