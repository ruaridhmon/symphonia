        suggestions:
        - 'C3: Remove entirely. None of the experts (E1-E12) mention the COVID-19 pandemic, developmental delays from lockdowns,
          or specific mental health acceleration related to the pandemic.'
        - 'C4: Avoid the term "diagnosis-led" as it is not used by E2 or E12. E2 focuses on "fragmentation of knowledge" and
          E12 on "systemic neglect/deficits in empathy." Rewrite to focus on the "bureaucratic labyrinth" mentioned by E12.'
