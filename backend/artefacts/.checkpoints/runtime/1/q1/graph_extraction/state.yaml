        Q: q1
        A: The notion of a "crisis" in Special Educational Needs provision is, to my mind, a disingenuous framing. It is not a sudden, emergent catastrophe, but rather the predictable, indeed inevitable, outcome of decades of deliberate policy neglect and a systemic perversion of the very concept of equitable resource allocation. To speak of drivers as if they are external forces acting upon a neutral system is to ignore the architects of this deliberate dismantling.

