- current_draft:
    text: |-
      The Special Educational Needs (SEN) landscape is characterized by many experts as financially and operationally unsustainable [T2_C1, agreement_0, agreement_7]. While a majority agreement exists that the system is reactive—focusing on crisis management rather than early intervention [T0_C2, agreement_3, agreement_5]—there is a significant "postcode lottery" in local authority capacity to deliver support [agreement_8]. Experts generally agree on a critical shortage of specialist staff, described by some as a "systemic starvation" of expertise, which leads to a reliance on generalist educators [T0_C4, T0_new_C6, agreement_6].

      Divisions exist regarding the causes of rising SEN cases. Some experts view this as a clinical success in reduced stigma and better identification [T1_new_C9, claim_18], while others argue it reflects an educational system failure to accommodate difference [T1_new_C9, claim_22]. Furthermore, while many cite a mismatch between neurodiversity identification and infrastructure, a divided perspective suggests this narrative may be a "distraction" from structural resource distribution issues [T1_C3, claim_12]. This debate extends to "private provider" industries and independent school placements, which a minority view identifies as a source of "perverse incentives" that drain resources from the state sector [T2_new_C10, claim_27].

      The efficacy of mainstream inclusion remains an area of uncertainty; experts disagree on whether it always provides the best outcome for children with complex needs [Synthesis Uncertainties, T1_C4]. Mainstream capacity is further complicated by high-stakes school accountability metrics that may disincentivize inclusive practices [T2_C2, claim_20]. Additionally, the statutory process is described by some experts as a "bureaucratic labyrinth" or "quagmire" [T1_C2, T2_C4, T2_new_C9]. This complexity is linked to "de facto inequality," where families with greater socio-economic resources more effectively navigate legal hurdles and the tribunal system [T0_C5, T0_new_C10, T1_C5].

      Significant contention remains regarding the 2014 SEN reforms. While some view them as a "clear mandate" for rights, others characterize them as a failure that increased demand without matching resources [T0_new_C9, T2_new_C9]. These tensions are compounded by what some experts call a "fragmentation of knowledge" and "systemic amnesia," where academic research and policy rhetoric are seen as decoupled from the lived experiences of families [T0_C3, T2_new_C7, claim_24]. A majority of experts suggest these cumulative factors, alongside a "loss of momentum" in policy, represent significant barriers to systemic change [T1_C6, claim_15].
    type: narrative
  initial_draft:
    text: "The prevailing expert consensus characterizes the current Special Educational Needs (SEN) landscape as a system\
      \ in a state of financial and operational unsustainability [T0_C4, T1_C1, T2_C1]. There is broad agreement that the\
      \ system has become reactive rather than preventative, prioritizing crisis management over early intervention despite\
      \ the recognized \"astronomical\" return on investment for proactive support [T0_C2, T2_C6]. Experts consistently identify\
      \ a systemic \"starvation\" of qualified specialist staff and a critical shortage of educational psychologists, which\
      \ facilitates a cycle of de-professionalisation and reliance on generalist educators who may lack the training required\
      \ for complex needs [T0_C4, T0_new_C6, T2_C6]. This infrastructure deficit extends to mainstream schools, which are\
      \ noted to lack the physical and human capacity to meet rising demand, a problem compounded by high-stakes accountability\
      \ metrics that disincentivize inclusive practices [T1_C4, T2_C2].\n\nDespite this consensus on systemic strain, deep\
      \ divisions exist regarding the underlying nature of the \"crisis.\" While many experts attribute the situation to predictable\
      \ policy neglect and a gap between statutory funding and the actual cost of provision, others argue the \"crisis\" narrative\
      \ is disingenuously used to obscure deliberate resource distribution choices or \"calculated indifference\" [T0_C1,\
      \ T1_C1, T2_C1, T2_C5]. Similar contention surrounds the 2014 SEN reforms; they are viewed by some as a clear mandate\
      \ for rights and by others as a \"failed legislative attempt\" that increased demand without providing necessary resources\
      \ [T0_new_C9, T2_new_C9]. These tensions are further reflected in the debate over rising SEN identification. Experts\
      \ disagree on whether this trend represents clinical success in reducing stigma or a failure of a rigid education system\
      \ to accommodate difference [T1_new_C9, T2_C5].\n\nThe navigation of this system is described by consensus as a \"bureaucratic\
      \ labyrinth\" or \"quagmire\" that exhausts local resources and prioritizes process over individual child needs [T1_C2,\
      \ T2_C4]. This complexity has birthed a \"de facto inequality,\" where families with greater socio-economic resources\
      \ can successfully navigate legal hurdles, secure private diagnostics, or litigate through a tribunal system that some\
      \ experts view as an inequitable mechanism [T0_C5, T0_new_C10, T1_C5]. Furthermore, there is significant debate regarding\
      \ the role of private providers, with some experts arguing that independent placements create \"perverse incentives\"\
      \ that drain the state sector [T1_new_C7, T2_new_C10]. \n\nAmidst these structural failures, substantial uncertainties\
      \ remain regarding the long-term efficacy of \"inclusion\" for children with the most complex needs and the extent to\
      \ which diagnostic overshadowing affects identification accuracy [T2_new_C10, T1_new_C9]. The long-term impacts of COVID-19\
      \ and digital technology on neurodevelopmental trends also remain unquantified, leaving experts to grapple with a system\
      \ characterized by \"systemic amnesia\" and \"fragmentation of knowledge,\" where polished policy rhetoric remains tragically\
      \ decoupled from the lived experiences of families [T2_new_C7, T2_new_C8]."
    type: narrative
