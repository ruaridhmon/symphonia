    text: |-
      The special educational needs (SEN) landscape is defined by significant expert disagreement regarding the nature of its funding challenges. While a majority of experts identify a gap between statutory funding and the cost of provision [T1_C1, T2_C1], others argue that framing the situation as a "crisis" is a disingenuous narrative used to obscure deliberate resource distribution choices [T0_C1]. Despite this, consensus exists that the current volume of Education, Health and Care Plan (EHCP) requests is unsustainable for local budgets [Agreement_7], leading to a reactive system focused on crisis management rather than preventative early intervention [T0_C2, Agreement_3].

      Systemic drivers of this instability include a reported shortage of specialist staff and educational psychologists [Agreement_6]. Some experts characterize this as a "systemic starvation" of expertise [T0_C4, T2_C1], exacerbated by the "fragmentation of knowledge" where academic research remains siloed from frontline practice [T0_C3, T2_new_C7]. Furthermore, high-stakes school accountability and performance metrics are identified as significant disincentives for mainstream schools to maintain inclusive environments [T2_C2, T2_new_C8].

      The statutory process itself is a point of contention. Some experts describe an adversarial "bureaucratic quagmire" that exhausts local authority resources and prioritizes administrative process over individual needs [T1_C2, T1_new_C7]. This complex administrative pathway is argued by some to favor families with greater socio-economic resources, creating a "de facto inequality" [T0_C5, T1_C5]. While a minority of experts highlight a "postcode lottery" regarding local authority capacity [T1_C5, T1_new_C7], others point to the role of private providers in draining state resources [T2_new_C10].

      Cultural and societal drivers also underpin the current friction. A minority of experts point to a prevailing "deficit-model" perspective and a broader societal ambivalence toward neurodiversity as causes of reform stagnation [T0_new_C8, T1_new_C8]. These cultural factors intersect with a perceived lack of institutional memory—described by some as "systemic amnesia"—where policy rhetoric remains decoupled from the lived experiences of families [T2_new_C7].

      Finally, significant uncertainties persist regarding the future of the sector. These include the unquantified long-term impacts of COVID-19 on SEN trends, the role of digital technology in support delivery, and the clinical efficacy of mainstream inclusion for increasingly complex needs [Uncertainties_Context]. Experts remain divided on whether rising identification reflects success in clinical practice or a failure of the education system to accommodate difference [T1_new_C9, T2_C5].
