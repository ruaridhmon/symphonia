  initial_draft:
    text: |-
      The expert consultation reveals a Special Educational Needs (SEN) system in a state of profound distress, characterized by a fundamental tension between statutory mandates and fiscal reality. There is a strong consensus that the current funding model is unsustainable and represents a form of "systemic starvation" [T0_C4, T2_C1]. While experts agree that the gap between statutory funding levels and the actual cost of provision is a primary driver of the crisis [T1_C1], they remain divided on the nature of this gap. Some characterize it as a predictable result of policy neglect, while others argue that framing the situation as a "crisis" is a disingenuous narrative used to mask deliberate resource distribution choices [T0_C1, T2_C5].

      A central point of agreement is the catastrophic failure in early identification and intervention. Experts concur that while proactive support offers an astronomical return on investment, the system remains reactive, prioritizing expensive crisis management over preventative care [T0_C2, T2_C6]. This failure is exacerbated by a "bureaucratic labyrinth" and "willful inertia" that forces families to navigate complex legal pathways to secure basic support [T2_C4, T1_C2]. Consequently, a "de facto inequality" has emerged, where families with greater socio-economic resources and the ability to litigate via the tribunal system are better positioned to secure provision, leaving others behind [T0_C5, T0_new_C10, T1_C5].

      The infrastructure of mainstream education is also a significant area of concern. There is a consensus regarding the systemic starvation of qualified specialist staff and a dilution of expertise, which prevents the sustainable implementation of support [T0_C4, T1_C4]. This "de-professionalisation" is often attributed to high-stakes school accountability metrics that disincentivize inclusive practices [T0_new_C6, T2_C2]. Furthermore, a "fragmentation of knowledge" exists where academic research is siloed from frontline practice, leading to a "systemic amnesia" where policy rhetoric is decoupled from the lived experiences of families [T0_C3, T2_new_C7].

      Significant debate persists regarding the root causes of the rise in SEN identification. Some experts view this as an "infrastructure lag" following successes in clinical practice and reduced stigma, while others see it as a failure of a rigid education system to accommodate neurodiversity [T1_new_C9, T2_C5]. Similarly, the 2014 SEN reforms are a point of contention; they are variously viewed as a "clear mandate" for rights or a failed legislative attempt that increased demand without providing necessary resources or accountability [T0_new_C9, T2_new_C9]. Underlying these structural issues is a perceived "societal ambivalence" toward difference and a "deficit-model" perspective that views children as problems to be managed [T0_new_C8, T1_new_C8]. Ultimately, while the need for reform is undisputed, uncertainty remains regarding whether "inclusion" in mainstream settings is always the optimal clinical outcome, and how much private diagnostic assessments and provider interests are currently distorting the equitable distribution of state resources [T1_new_C7, T2_new_C10].
