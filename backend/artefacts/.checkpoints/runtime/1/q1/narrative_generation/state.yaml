    fitness_evaluation:
      completeness:
        dimension: completeness
        rationale: The narrative effectively captures major consensus themes regarding financial sustainability, early intervention,
          and workforce shortages. However, it completely omits the entire 'Uncertainties' section from the synthesis, which
          is a major pillar of completeness. Furthermore, it ignores several "divided" and "minority" claims that provide
          critical depth to the crisis drivers, specifically the role of the "private provider industry" [T2_new_C10] and
          the impact of the COVID-19 pandemic/digital technology on demand.
        score: 3
        suggestions:
        - Integrate the 'Uncertainties' section from the synthesis, particularly regarding the long-term impact of COVID-19,
          digital technology, and whether mainstream inclusion is always the best outcome for complex needs.
        - Incorporate the divided perspective regarding private providers and independent placements [T2_new_C10] as a driver
          of resource depletion from the state sector.
        - 'Address the conflict regarding the rise in SEN cases: specifically whether it represents a clinical success/reduced
          stigma or an educational system failure [T1_new_C9, T2_C5].'
        - Mention the "postcode lottery" and local authority capacity variations which are identified as a significant area
          of agreement but missing from the prose.
      dissent_visibility:
        dimension: dissent_visibility
        rationale: The narrative achieves moderate visibility but suffers from "smoothing" by framing several highly divided
          issues within a consensus-driven structure. While it successfully captures the split on the 2014 reforms (T0_new_C9)
          and the "funding gap" (T0_C1), it collapses the significant debate regarding the rise in SEN cases—whether it is
          a clinical success or a systemic failure (T1_new_9, T2_C5)—into a brief mention of "infrastructure lag." Furthermore,
          the narrative completely omits several critical areas of dissent found in the synthesis, such as the role of private
          providers draining state budgets (T2_new_10) and the fundamental uncertainty regarding the efficacy of mainstream
          inclusion. The use of phrases like "The prevailing expert consensus" at the start of paragraphs tends to bury the
          "divided" nature of claims like T0_C4 and T1_C3, which the synthesis marks as having significant counter-narratives.
        score: 3
        suggestions:
        - Explicitly incorporate the conflict regarding the 'rise in cases' (T1_new_9, T2_C5), contrasting the view of clinical
          success/reduced stigma against the view of a rigid education system failing to adapt.
        - Include the minority view and area of disagreement regarding private providers and independent placements creating
          'perverse incentives' that drain state resources (T2_new_10).
        - Address the identified uncertainty regarding whether 'inclusion' in mainstream settings is actually the best outcome
          for complex needs, rather than presenting inclusive capacity only as a 'strain' (T1_C4, Search Synthesis Uncertainties).
        - Elevate the 'divided' claim about the rise in neurodiversity identification (T1_C3) to show it is viewed by some
          as a 'distraction' from structural resource issues, rather than just an infrastructure deficit.
      faithfulness:
        dimension: faithfulness
        rationale: The narrative is highly faithful to the source synthesis. Every claim in the text maps directly to specific
          source IDs (e.g., T1_C4, T2_C2 for accountability metrics; T2_new_C7 for systemic amnesia). The narrative preserves
          the nuances of the "divided" and "majority" labels appropriately. Terms like "systemic starvation," "bureaucratic
          labyrinth," and "de facto inequality" are drawn directly from the expert quotes provided in the synthesis. There
          is no evidence of novel claims or facilitator gloss; the synthesis's hedging (e.g., "some characterize," "others
          argue") is strictly maintained.
        score: 5
        suggestions:
        - 'Paragraph 1: Ensure that the mention of "school accountability and performance metrics" remains explicitly tied
          to its impact on "inclusive capacity" as per T2_C2 to avoid any broader structural inferences not in the text.'
        - 'Paragraph 4: Maintain the specific attribution of "systemic amnesia" to experts E2 and E6 to ensure the "divided"
          nature of the claim from T2_new_C7 is fully transparent in the next iteration.'
      neutrality:
        dimension: neutrality
        rationale: The narrative summary is moderately neutral (Band 5). While it successfully avoids explicit 'should' or
          'must' statements, it relies heavily on loaded, emotive language borrowed from specific experts without sufficient
          distancing or attribution of the "color" to the sources. Phrases such as "systemic starvation," "bureaucratic labyrinth,"
          "quagmire," and "systemic amnesia" are highly evaluative. While these terms appear in the source claims (T0_C4,
          T1_C2, T2_new_C7), their integration into the prose—sometimes without quotation marks—creates an implicit endorsement
          of a crisis-oriented framing. Additionally, the narrative uses the evaluative adjective "primary" twice to elevate
          certain drivers over others. The sentence structure in the final paragraph ("preventing the implementation of...
          solutions") implies a recommendation for action, bordering on advocacy rather than pure facilitation.
        score: 3
        suggestions:
        - Reframing "systemic starvation" as "a significant reduction in specialized workforce resources" to lower the emotional
          temperature of the prose [T0_C4].
        - Remove the definitive evaluative adjective "primary" when describing drivers; instead, state "A majority of experts
          identify a driver as..." to maintain facilitator distance [T0_new_C7].
        - Explicitly attribute or place in quotation marks the terms "bureaucratic labyrinth" and "quagmire" to ensure they
          are presented as expert descriptors rather than factual narrative observations [T1_C2, T2_C4].
        - Rewrite the final sentence to avoid the implicit recommendation for "sustainable, proactive solutions," focusing
          instead on the barriers identified by experts without characterizing the outcome [T1_C6].
      structural_clarity:
        dimension: structural_clarity
        rationale: The narrative demonstrates a clear logical progression, starting with the systemic landscape, moving to
          primary drivers/oversight, then to the experience of the process, and finally to knowledge fragmentation. Paragraph
          boundaries are generally well-defined by theme. However, the internal structure of the second paragraph is slightly
          cluttered, mixing oversight, funding debates, and the 2014 reforms without strong transitional signposting, which
          slightly obscures the distinction between consensus and divided points.
        score: 4
        suggestions:
        - In the second paragraph, use clearer signposting to separate the consensus on 'oversight and accountability' from
          the 'significant divisions' regarding funding and reforms to avoid a mid-paragraph topical jump.
        - Strengthen the transition between the third paragraph (the bureaucratic process) and the final paragraph (knowledge
          fragmentation) to clarify how these distinct drivers relate to the overall 'current crisis' narrative.
        - Consider lead-in sentences for each paragraph that explicitly categorize the upcoming points (e.g., 'Beyond structural
          deficits, experts highlight institutional and legal drivers...') to improve expert navigability.
      traceability:
        dimension: traceability
        rationale: 'The narrative demonstrates a high density of citations, with nearly every substantive claim linked to
          specific synthesis IDs (e.g., [T0_C4], [T1_new_C8]). The audit trail is strong, and the narrative accurately reflects
