# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - develop
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      IS_PROD: ${{ github.ref_name == 'main' }}
      IS_DEV: ${{ github.ref_name == 'develop' }}
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
        working-directory: frontend
      - name: Build frontend (production mode)
        if: env.IS_PROD == 'true'
        run: npm run build -- --mode production
        working-directory: frontend
      - name: Build frontend (development mode)
        if: env.IS_DEV == 'true'
        run: npm run build -- --mode development
        working-directory: frontend
      - name: Prepare Firebase config (prod)
        if: env.IS_PROD == 'true'
        run: cp firebase.prod.json firebase.json
      - name: Prepare Firebase config (dev)
        if: env.IS_DEV == 'true'
        run: |
          cp firebase.dev.json firebase.json
          if grep -n "REPLACE_WITH_DEV_CLOUD_RUN_SERVICE_ID" firebase.json; then
            echo "Set the real dev Cloud Run serviceId in firebase.dev.json before deploying."
            exit 1
          fi
      - name: Deploy to Firebase Hosting (prod)
        if: env.IS_PROD == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SYMPHONIA_488513 }}
          channelId: live
          projectId: symphonia-488513
          entryPoint: .
      - name: Deploy to Firebase Hosting (dev)
        if: env.IS_DEV == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SYMPHONIA_DEV }}
          channelId: live
          projectId: symphonia-dev-488613
          entryPoint: .
