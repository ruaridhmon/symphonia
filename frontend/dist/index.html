      ;(function() {
        var STORAGE_KEY = 'symphonia-theme';
        var DEFAULT = 'axiotic-light';
        var VALID = ['axiotic-dark', 'axiotic-light', 'apple'];

        var themes = {
          'axiotic-light': {

              '--ring':'#2563eb','--radius':'0.5rem',
              '--font-family':"'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            }
          },
          'axiotic-dark': {

            }
          },
          'apple': {
            type: 'light',
            vars: {
              '--background':'#f5f5f7','--foreground':'#1d1d1f',
              '--card':'#ffffff','--card-foreground':'#1d1d1f',
              '--card-shadow':'0 1px 3px rgba(0,0,0,0.06)',

              '--secondary':'#f5f5f7','--secondary-foreground':'#1d1d1f',
              '--muted':'#f5f5f7','--muted-foreground':'#86868b',
              '--accent':'#007aff','--accent-foreground':'#ffffff','--accent-hover':'#0056b3',

              '--success':'#34c759',
              '--highlight':'#e8f0fe','--highlight-foreground':'#0055d4','--highlight-border':'#a8c8f0',
              '--border':'#d2d2d7','--input':'#d2d2d7',

              '--font-family':"-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', sans-serif"
            }
          }
        };

        try {
          var stored = localStorage.getItem(STORAGE_KEY);
          var id = (stored && VALID.indexOf(stored) !== -1) ? stored : DEFAULT;
        } catch(e) {
          var id = DEFAULT;
        }

        var t = themes[id];
        var root = document.documentElement;
        root.setAttribute('data-theme', id);

        if (t.type === 'dark') {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }

        var vars = t.vars;
        for (var k in vars) {
          if (vars.hasOwnProperty(k)) {
            root.style.setProperty(k, vars[k]);
          }
        }
      })();
    </script>
