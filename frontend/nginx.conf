worker_processes 1;
worker_shutdown_timeout 10s;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    keepalive_timeout 5;

    # WebSocket upgrade map — sets $connection_upgrade to "upgrade" when
    # the client sends an Upgrade header, otherwise falls back to "close".
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── SPA static files ──────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── WebSocket endpoint (/api/ws → backend /ws) ───────────────
        location /api/ws {
            proxy_pass http://backend:8000/ws;
            proxy_http_version 1.1;

            # Required for WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long-lived connection timeouts (1 hour)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── REST API (/api/* → backend /*) ────────────────────────────
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Reasonable timeouts for API calls (synthesis can be slow)
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
